name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: PHP ${{ matrix.php }} · Symfony ${{ matrix.symfony }} · ${{ matrix.deps }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { php: '8.2', symfony: '^7.0', deps: 'lowest' }
          - { php: '8.3', symfony: '^7.0', deps: 'highest' }
          - { php: '8.4', symfony: '^7.0', deps: 'highest' }
          - { php: '8.4', symfony: '^8.0', deps: 'highest' }

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_sqlite
          coverage: none

      - run: composer validate --strict

      # Pin the Symfony major for this leg without touching composer.json.
      - name: Install dependencies (highest)
        if: matrix.deps == 'highest'
        run: >
          composer update --prefer-dist --no-interaction --no-progress
          --with "symfony/framework-bundle:${{ matrix.symfony }}"
          --with "symfony/yaml:${{ matrix.symfony }}"

      - name: Install dependencies (lowest)
        if: matrix.deps == 'lowest'
        run: >
          composer update --prefer-dist --prefer-lowest --no-interaction --no-progress
          --with "symfony/framework-bundle:${{ matrix.symfony }}"
          --with "symfony/yaml:${{ matrix.symfony }}"

      - run: vendor/bin/phpunit

  static-analysis:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - run: composer update --prefer-dist --no-interaction --no-progress

      - run: vendor/bin/phpstan analyse --no-progress
